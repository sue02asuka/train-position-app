name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS (unsigned)
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace: $WORKSPACE  scheme: $SCHEME"
          echo "Available schemes:"
          xcodebuild -workspace "$WORKSPACE" -list 2>&1 || true
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.suesan.trainpositionnative \
            build \
            CONFIGURATION_BUILD_DIR="${PWD}/build/iphoneos" \
            | xcpretty || true
          # xcpretty がなくても続行するため || true
          ls build/iphoneos/
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP=$(ls build/iphoneos/*.app | head -1)
          echo "Packaging: $APP"
          cp -r "$APP" Payload/
          zip -r output.ipa Payload
          echo "IPA size: $(du -sh output.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: output.ipa
          retention-days: 7
